<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desa Sumberoto/title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Sticky Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        /* Add padding to prevent content from being hidden under the navbar */
        .content-wrapper {
            margin-top: 70px; /* Adjust based on navbar height */
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .blog-post {
            padding: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }

        .blog-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .blog-content {
            font-size: 16px;
            text-align: justify;
            white-space: pre-line;
        }

        .blog-meta {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            display: block;
        }

        .blog-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
        }

        .no-blogs {
            text-align: center;
            font-size: 18px;
            color: #999;
        }
    </style>
</head>
<body>
    <!-- Sticky Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'index' %}">SDM Portabel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <div class="content-wrapper">
        <div class="container">
            <h2 class="title">Blog List</h2>

            {% if blogs %}
            {% for blog in blogs %}
            <div class="blog-post">
                <h3 class="blog-title">{{ blog.title }}</h3>
                <p class="blog-content">{{ blog.content|linebreaks }}</p>  
        
                <!-- ✅ Debugging: Menampilkan URL gambar -->
                {% if blog.image %}
                    <p>DEBUG: Image URL = {{ blog.image.url }}</p>
                    <img src="{{ blog.image.url }}" alt="Blog Image" class="blog-image img-fluid">
                {% else %}
                    <p>DEBUG: Tidak ada gambar</p>
                {% endif %}
        
                <small class="blog-meta">By {{ blog.penulis.username }} at {{ blog.created_at }}</small>
            </div>
        {% endfor %}
        
            {% else %}
                <p class="no-blogs">No blog posts available.</p>
            {% endif %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
