{% load static %}

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Daftar Antrian - Desa Wisata Sumberoto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/antrian.css' %}">

  <!-- Tambahkan html2canvas dari CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

  <!-- ✅ Include Navbar -->
  {% include 'partials/navbar.html' %}

  <div class="container mt-5" id="antrian-container">
    <div class="card shadow p-4">
      <h2 class="mb-3 text-center">Nomor Antrian Anda</h2>
      <div class="text-center">
        <h1 class="display-1">{{ antrian.nomor }}</h1>
      </div>
      <hr>
      <p><strong>NIK:</strong> {{ antrian.nik }}</p>
      <p><strong>Nama:</strong> {{ antrian.nama }}</p>
      <p><strong>RT:</strong> {{ antrian.rt }}</p>
      <p><strong>RW:</strong> {{ antrian.rw }}</p>
    </div>

    <!-- Tombol Screenshot -->
    <div class="text-center mt-4">
      <button class="btn btn-primary" onclick="takeScreenshot()">📸 Simpan Antrian sebagai Gambar</button>
    </div>
  </div>

  <!-- JavaScript Screenshot -->
  <script>
    function takeScreenshot() {
      const container = document.getElementById('antrian-container');
      html2canvas(container).then(canvas => {
        const link = document.createElement('a');
        link.download = 'nomor-antrian.png';
        link.href = canvas.toDataURL();
        link.click();
      });
    }
  </script>

</body>
</html>
