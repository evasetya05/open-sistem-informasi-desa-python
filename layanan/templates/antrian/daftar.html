{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Daftar Antrian - Desa Wisata Sumberoto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/antrian.css' %}">
</head>
<body>

  <!-- Navbar -->
  {% include 'partials/navbar.html' %}

  <!-- Konten -->
  <div class="container mt-5">
    <div class="card shadow p-4 antrian-card">
      <h2 class="mb-4 text-center text-success">Daftar Antrian</h2>
        <div class="alert alert-info text-center fw-bold">
          Anda sedang mendaftar untuk kegiatan: <span class="text-primary">{{ session.kegiatan }}</span>
        </div>
      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label for="nik" class="form-label">NIK</label>
          <input type="text" class="form-control" id="nik" name="nik" required>
        </div>

        <div class="mb-3">
          <label for="nama" class="form-label">Nama</label>
          <input type="text" class="form-control" id="nama" name="nama" required>
        </div>

        <div class="mb-3">
          <label for="rt" class="form-label">RT</label>
          <select class="form-control" id="rt" name="rt" required>
            <option value="">Pilih RT</option>
            <!-- Opsi akan diisi via JS -->
          </select>
        </div>

        <div class="mb-3">
          <label for="rw" class="form-label">RW</label>
          <select class="form-control" id="rw" name="rw" required>
            <option value="">Pilih RW</option>
            <!-- Opsi akan diisi via JS -->
          </select>
        </div>

        <div class="text-center">
          <button type="submit" class="btn btn-success">Ambil Nomor</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Script Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script JavaScript untuk isi RT/RW -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      function populateDropdown(id, max) {
        const select = document.getElementById(id);
        if (select.options.length > 1) return;  // Hindari isi ulang jika sudah ada opsi

        for (let i = 1; i <= max; i++) {
          const option = document.createElement("option");
          option.value = i;
          option.text = i;
          select.appendChild(option);
        }
      }

      populateDropdown("rt", 15);
      populateDropdown("rw", 15);
    });
  </script>
</body>
</html>
