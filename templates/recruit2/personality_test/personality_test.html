<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big 5 personality Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1 {
            color: #4CAF50;
        }
        .link-container {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .note {
            margin-top: 20px;
            font-style: italic;
        }
        .question-block {
            margin-bottom: 1.5em;
        }
        .options-container {
            display: flex;
            gap: 1em;
        }
        label {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }
        input[type="radio"] {
            margin-right: 0.4em;
        }
        .error-message {
            color: red;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'index' %}">SDM Portabel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

   
        <form id="personalityTestForm" method="POST" action="{% url 'personality_test' token=test.applicant.token %}">
            {% csrf_token %}

            <h3>Test: {{ test.applicant.name }}'s Personality Test</h3>

            
            <!-- Remark scale: 1 = Tidak Setuju, 5 = Paling Setuju -->
            <div class="mb-3">
                <label for="remarkScale" class="form-label">
                    Pilihlah nomor yang paling sesuai menurutmu: 1 (Tidak Setuju) - 3 (Setuju) - 5 (Paling Setuju). 
                    Jika sudah dipilih semua, klik Kirim Jawaban.
                </label>
            </div>
            

            {% for question in questions %}
                <div class="question-block" id="question-block-{{ question.id }}">
                    <h4>{{ question.text }}</h4>
                    <div class="options-container">
                        {% for option in question.options %}
                            <label>
                                <input type="radio" name="question_{{ question.id }}" value="{{ option }}">
                                {{ option }}
                            </label>
                        {% endfor %}
                    </div>
                    <div class="error-message" id="error-{{ question.id }}" style="display: none;">
                        Pertanyaan nomor {{ forloop.counter }} belum diisi.
                    </div>
                </div>
            {% endfor %}

            <button type="submit" id="submitButton" class="btn btn-primary mt-3">Kirim Jawaban</button>
        </form>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const form = document.getElementById('personalityTestForm');
                const submitButton = document.getElementById('submitButton');
                const radioGroups = [...new Set(Array.from(form.elements)
                    .filter(element => element.type === 'radio')
                    .map(element => element.name))];

                form.addEventListener('submit', (event) => {
                    let allValid = true;
                    let errorMessages = [];

                    radioGroups.forEach(group => {
                        const questionBlockId = group.split('_')[1];
                        const errorElement = document.getElementById(`error-${questionBlockId}`);
                        const isAnswered = form.querySelector(`input[name="${group}"]:checked`);

                        if (!isAnswered) {
                            allValid = false;
                            errorElement.style.display = 'block';
                            errorMessages.push(`Jawaban belum lengkap di nomor ${questionBlockId}`);
                        } else {
                            errorElement.style.display = 'none';
                        }
                    });

                    if (!allValid) {
                        event.preventDefault();
                        alert(errorMessages.join('\n'));
                    }
                });
            });
        </script>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
