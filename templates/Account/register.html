{% extends 'Account/lr-base.html' %}
{% block lr_title %}
    Daftar:
{% endblock %}
{% block lr_form %}
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Nama Pengguna:</label>
            <input type="text" name="username" class="form-control" id="username" placeholder="Masukkan nama pengguna">
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" name="email" class="form-control" id="email" placeholder="Masukkan email">
        </div>
        <div class="form-group">
            <label for="password">Kata Sandi:</label>
            <input type="password" name="password1" class="form-control" id="password" placeholder="Masukkan kata sandi">
        </div>
        <div class="form-group">
            <label for="password2">Konfirmasi Kata Sandi:</label>
            <input type="password" name="password2" class="form-control" id="password2" placeholder="Konfirmasi kata sandi">
        </div>
        <button type="submit" class="btn btn-primary">Daftar</button>
    </form>
{% endblock %}
{% block lr_help %}
    <p>Sudah punya akun? <span><a href="{% url 'user:login' %}">Masuk</a></span></p>
{% endblock %}
