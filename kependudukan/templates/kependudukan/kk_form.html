
{% block content %}
<div class="container mt-4">
  <h2>{% if form.instance.pk %}Edit{% else %}Tambah{% endif %} Kartu Keluarga</h2>
  <form method="post" class="mt-3">
    {% csrf_token %}
    
    <div class="card p-3 shadow-sm">
      {{ form.as_p }}
    </div>
    
    <div class="mt-3">
      <button type="submit" class="btn btn-success">💾 Simpan</button>
      <a href="{% url 'kk_list' %}" class="btn btn-secondary">Kembali</a>
    </div>
  </form>
</div>
{% endblock %}
